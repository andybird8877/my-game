<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#243038"/>
      <stop offset="55%" stop-color="#141c24"/>
      <stop offset="100%" stop-color="#070a0c"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
    </radialGradient>
    <linearGradient id="robe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#444f56"/>
      <stop offset="100%" stop-color="#1f262b"/>
    </linearGradient>
    <linearGradient id="veil" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5e8c8" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#f5e8c8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f5e8c8" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9a8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffe9a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sageGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cfe6c8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#cfe6c8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurSoft" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blurWide" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="11"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- faint banner shapes -->
  <rect x="30" y="-30" width="38" height="290" fill="#222a30" opacity="0.35" transform="rotate(4 50 110)"/>
  <rect x="330" y="-48" width="40" height="305" fill="#222a30" opacity="0.3" transform="rotate(-5 350 105)"/>

  <!-- gold star sigil -->
  <g transform="translate(46,44)" opacity="0.85">
    <path d="M0,-13 L3,-3 L13,0 L3,3 L0,13 L-3,3 L-13,0 L-3,-3 Z" fill="#f3d98a"/>
    <circle r="18" fill="none" stroke="#f3d98a" stroke-opacity="0.3" stroke-width="1"/>
  </g>

  <!-- hand glow wisps -->
  <ellipse cx="156" cy="320" rx="48" ry="44" fill="url(#goldGlow)" filter="url(#blurWide)"/>
  <ellipse cx="244" cy="320" rx="48" ry="44" fill="url(#sageGlow)" filter="url(#blurWide)"/>
  <path d="M156,316 C152,264 172,208 192,160" stroke="#ffe9a8" stroke-width="1.2" fill="none" opacity="0.35"/>
  <path d="M244,316 C250,264 232,204 210,158" stroke="#cfe6c8" stroke-width="1.2" fill="none" opacity="0.35"/>

  <!-- robe / shoulders -->
  <path d="M92,400 L142,204 Q200,176 258,204 L308,400 Z" fill="url(#robe)"/>
  <path d="M142,204 Q200,176 258,204 L250,222 Q200,198 150,222 Z" fill="#1c2328" opacity="0.6"/>

  <!-- hood -->
  <path d="M149,164 Q131,82 200,52 Q269,82 251,164 Q200,194 149,164 Z" fill="url(#robe)"/>
  <path d="M149,164 Q131,82 200,52 Q269,82 251,164" fill="none" stroke="#69767d" stroke-width="2.5" opacity="0.5"/>

  <!-- shadowed face -->
  <ellipse cx="200" cy="142" rx="42" ry="48" fill="#2c3338"/>
  <ellipse cx="200" cy="142" rx="42" ry="48" fill="#000000" opacity="0.25"/>

  <!-- veil with glowing rune-eyes -->
  <rect x="158" y="126" width="84" height="21" rx="10" fill="url(#veil)"/>
  <g filter="url(#blurSoft)">
    <circle cx="181" cy="136" r="4" fill="#ffe9a8"/>
    <circle cx="200" cy="136" r="4" fill="#ffe9a8"/>
    <circle cx="219" cy="136" r="4" fill="#ffe9a8"/>
  </g>
  <circle cx="181" cy="136" r="1.6" fill="#fff6df"/>
  <circle cx="200" cy="136" r="1.6" fill="#fff6df"/>
  <circle cx="219" cy="136" r="1.6" fill="#fff6df"/>

  <!-- vignette -->
  <rect width="400" height="400" fill="url(#vignette)"/>

  <!-- border frame -->
  <rect x="11" y="11" width="378" height="378" fill="none" stroke="#f3d98a" stroke-opacity="0.25" stroke-width="1.5"/>
</svg>
